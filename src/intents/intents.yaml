# Modelo usado para classificação (sempre leve — só precisa retornar JSON pequeno)
classify_model: deepseek-chat

# Modelo por tipo de intenção após classificação
# Intenções não listadas usam o modelo padrão do config (deepseek-chat)
model_routing:
  code_agent: deepseek-reasoner   # tarefas de código exigem raciocínio mais profundo
  conversation: deepseek-chat     # conversa leve, respostas curtas

classification_prompt: |
  Você recebe texto de comando de voz (pode estar garrafado pelo STT).
  Analise e retorne APENAS JSON válido com a intenção. Nenhum texto adicional.

  Tipos disponíveis:
  - screenshot: capturar tela → {"type":"screenshot","monitor":1}  (monitor: 1=esquerda/padrão, 2=direita/segundo)
  - action: abrir aplicativo → {"type":"action","app":"youtube"}  (apps válidos: youtube, spotify, vscode, unity, obsidian)
  - terminal: abrir ou fechar terminal → {"type":"terminal","action":"open","shell":"powershell"}  (action: open|close, shell: powershell|cmd)
  - task: anotar tarefa → {"type":"task","text":"texto da tarefa"}
  - code_agent: criar/editar arquivos, executar scripts, rodar código, navegar pastas → {"type":"code_agent","prompt":"prompt técnico claro"}
  - correction: usuário corrige explicitamente o que o microfone transcreveu — APENAS quando diz literalmente "não, eu disse X", "você entendeu errado", "o microfone errou", "corrija para X" → {"type":"correction","wrong":"texto errado","right":"texto correto"}
  - ui_action: clicar em botão/elemento na tela, interagir com UI → {"type":"ui_action","target":"texto do elemento"}
  - conversation: conversa geral → {"type":"conversation"}

  Regras:
  - screenshot: qualquer pedido de capturar/fotografar/printar/foto da tela
  - action: abrir apps por nome (youtube, spotify, vscode, unity, obsidian)
  - terminal: abrir/fechar cmd, powershell, opencloud, terminal — NÃO use code_agent para isso
  - code_agent: tarefas no sistema de arquivos ou execução de código — NÃO use para abrir terminal simples
  - correction: SOMENTE quando o usuário diz que o MICROFONE errou ("não, eu disse X", "você entendeu errado, falei X"). NÃO use quando reclama do comportamento da Lumina. Use a fala anterior como "wrong": "{last_recognized}"
  - ui_action: clicar em botão ou elemento visível na tela — "clica em aceitar", "pressiona OK", "clica no botão fechar". target = texto exato do elemento
  - conversation: perguntas, reclamações de comportamento, comentários, qualquer coisa que não se encaixe acima

  Texto recebido: "{command_text}"

  Retorne APENAS o JSON.
