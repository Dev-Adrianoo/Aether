# Modelo usado para classificação (sempre leve — só precisa retornar JSON pequeno)
classify_model: deepseek-chat

# Modelo por tipo de intenção após classificação
# Intenções não listadas usam o modelo padrão do config (deepseek-chat)
model_routing:
  code_agent: deepseek-reasoner   # tarefas de código exigem raciocínio mais profundo
  conversation: deepseek-chat     # conversa leve, respostas curtas

classification_prompt: |
  Você recebe texto de comando de voz (pode estar garrafado pelo STT).
  Analise e retorne APENAS JSON válido com a intenção. Nenhum texto adicional.

  Tipos disponíveis:
  - screenshot: capturar tela → {"type":"screenshot","monitor":1}  (monitor: 1=esquerda/padrão, 2=direita/segundo)
  - action: abrir aplicativo → {"type":"action","app":"youtube"}  (apps válidos: youtube, spotify, vscode, unity, obsidian)
  - terminal: abrir ou fechar terminal → {"type":"terminal","action":"open","shell":"powershell"}  (action: open|close, shell: powershell|cmd)
  - task: anotar tarefa → {"type":"task","text":"texto da tarefa"}
  - code_agent: criar/editar arquivos, executar scripts, rodar código, navegar pastas → {"type":"code_agent","prompt":"prompt técnico claro"}
  - correction: usuário corrige explicitamente o que o microfone transcreveu → {"type":"correction","wrong":"texto errado","right":"texto correto"}
  - ui_action: clicar/pressionar/selecionar elemento na tela → {"type":"ui_action","target":"texto do elemento"}
  - conversation: conversa geral → {"type":"conversation"}

  Regras (ordem de prioridade — aplique a PRIMEIRA que se encaixar):

  1. ui_action: PRIORIDADE MÁXIMA. Use sempre que o texto contiver verbo de interação com tela:
     clica, clique, clicou, pressiona, pressione, toca em, seleciona, selecione, abre (seguido de elemento de UI).
     target = o nome/texto do elemento visível na tela.
     Exemplos: "clique no devluminaagent" → ui_action target=devluminaagent
               "clica em aceitar" → ui_action target=aceitar
               "pressione OK" → ui_action target=OK
               "selecione a pasta src" → ui_action target=src

  2. screenshot: pedido de capturar/fotografar/printar/foto da tela.

  3. action: abrir app por nome — youtube, spotify, vscode, unity, obsidian.

  4. terminal: SOMENTE pedido explícito de abrir/fechar terminal, cmd, powershell.
     NÃO use se o texto tiver verbo de clique (regra 1 tem prioridade).

  5. code_agent: tarefas técnicas — criar/editar arquivo, rodar script, navegar pastas.
     NÃO use para abrir terminal simples.

  6. correction: SOMENTE quando o usuário diz que o MICROFONE errou.
     Frases típicas: "não, eu disse X", "você entendeu errado", "o microfone errou", "corrija para X".
     NÃO use quando reclama do comportamento da Lumina.
     wrong = "{last_recognized}"

  7. conversation: qualquer coisa que não se encaixe acima — perguntas, reclamações de comportamento, comentários.

  Texto recebido: "{command_text}"

  Retorne APENAS o JSON.
