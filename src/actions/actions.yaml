  unity:
    keywords: [unity]
    type: exe
    # target null = path desconhecido, self-learning vai preencher
    target: null
    learned: false

  obsidian:
    keywords: [obsidian]
    type: exe_vault
    # loader injeta dev_vault_path e OBSIDIAN_EXE_CANDIDATES via config
